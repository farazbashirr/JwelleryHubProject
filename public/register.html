<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - JewelleryHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark py-3 shadow">
  <div class="container">
    <a class="navbar-brand fw-bold text-warning" href="index.html" style="font-size: 1.8rem;">JewelleryHub</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="categories.html">Categories</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link px-3 active" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Register Form -->
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-box col-md-5">
    <h2 class="text-center mb-4 login-title">Create Your Account</h2>
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" id="password" class="form-control" placeholder="Enter your password (min 6 characters)" required minlength="6" />
          <span class="input-group-text" style="cursor:pointer;">
            <i class="bi bi-eye-slash" id="togglePassword"></i>
          </span>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required />
          <span class="input-group-text" style="cursor:pointer;">
            <i class="bi bi-eye-slash" id="toggleConfirmPassword"></i>
          </span>
        </div>
      </div>
      <button type="submit" class="btn btn-warning w-100">Register</button>
    </form>
    <div class="text-center mt-3">
      <p class="mb-0">Already have an account? <a href="login.html" class="text-warning fw-bold">Login here</a></p>
    </div>
  </div>
</div>

<footer class="bg-black text-white text-center py-3">
  <p class="mb-0">© 2025 JewelleryHub. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Register Logic -->
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    // Validation
    if (password.length < 6) {
      alert("Password must be at least 6 characters long");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match!");
      return;
    }

    try {
      const res = await fetch('http://localhost:3000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password })
      });

      const contentType = res.headers.get("content-type");
      let data;

      if (contentType && contentType.includes("application/json")) {
        data = await res.json();
      } else {
        const text = await res.text();
        console.warn("Non-JSON response:", text);
        throw new Error("Server did not return JSON");
      }

      if (res.ok) {
        alert("Registration successful! Please login.");
        window.location.href = "login.html";
      } else {
        alert(data.message || "Registration failed. Please try again.");
      }
    } catch (err) {
      console.error("Registration error:", err.message);
      alert("Something went wrong: " + err.message);
    }
  });

  // Password visibility toggle
  document.getElementById('togglePassword').addEventListener('click', function () {
    const passwordField = document.getElementById('password');
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
  });

  document.getElementById('toggleConfirmPassword').addEventListener('click', function () {
    const confirmPasswordField = document.getElementById('confirmPassword');
    const type = confirmPasswordField.getAttribute('type') === 'password' ? 'text' : 'password';
    confirmPasswordField.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
  });
</script>

</body>
</html>
